<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="https://www.paiscircular.cl/wp-content/uploads/2022/08/cropped-Logo-Pais-Letras-Negras-270x270.png" />
    <link rel="apple-touch-icon" href="https://www.paiscircular.cl/wp-content/uploads/2022/08/cropped-Logo-Pais-Letras-Negras-270x270.png" />
    <title>DS 22/2025 — Pilas y AEE · País Circular</title>
    <meta name="description" content="Navegador interactivo del Decreto Supremo N° 22/2025: metas de recolección y valorización de pilas y aparatos eléctricos y electrónicos. Ley REP Chile." />
    <meta property="og:title" content="DS 22/2025 — Pilas y AEE · País Circular" />
    <meta property="og:description" content="Navegador interactivo del Decreto Supremo N° 22/2025: metas de recolección y valorización de pilas y aparatos eléctricos y electrónicos. Ley REP Chile." />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="es_CL" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Source+Serif+4:wght@400;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        font-family: 'DM Sans', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!--
      Netlify Forms — declaración estática para que el build de Netlify detecte
      los formularios y cree los endpoints. Los envíos reales se hacen desde
      React vía fetch() a la raíz "/". No tocar los `name` ni los `input name`.
    -->
    <form name="newsletter" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="email" name="email" />
      <input type="text" name="perfil" />
      <input type="text" name="bot-field" />
    </form>
    <form name="auspicio" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="nombre" />
      <input type="email" name="email" />
      <input type="text" name="empresa" />
      <textarea name="mensaje"></textarea>
      <input type="text" name="bot-field" />
    </form>

    <script type="module" src="/src/main.jsx"></script>

    <!--
      Cloudflare Web Analytics — gratis, sin cookies, privacy-friendly.
      Para activar: crear cuenta en https://www.cloudflare.com/web-analytics/,
      agregar el sitio navegador-ds22.netlify.app y reemplazar __CLOUDFLARE_TOKEN__
      por el token que entrega el panel. Hasta que esté reemplazado, no traquea.
    -->
    <script defer src="https://static.cloudflareinsights.com/beacon.min.js"
      data-cf-beacon='{"token": "__CLOUDFLARE_TOKEN__"}'></script>
  </body>
</html>
